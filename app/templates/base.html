<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Teradata Vector Store</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}?v=20260606-1" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="{{ url_for('static', path='js/step-gate.js') }}?v=20260518-1"></script>
  <script defer src="{{ url_for('static', path='js/modules/core.js') }}?v=20260309-1"></script>
  <script defer src="{{ url_for('static', path='js/modules/create-uploads.js') }}?v=20260414-7"></script>
  <script defer src="{{ url_for('static', path='js/modules/create-params.js') }}?v=20260416-1"></script>
  <script defer src="{{ url_for('static', path='js/modules/destroy-panel.js') }}?v=20260414-3"></script>
  <script defer src="{{ url_for('static', path='js/modules/htmx-progress.js') }}?v=20260414-2"></script>
  <script defer src="{{ url_for('static', path='js/modules/navigation.js') }}?v=20260409-3"></script>
  <script defer src="{{ url_for('static', path='js/modules/chat-retrieval.js') }}?v=20260331-1"></script>
  <script defer src="{{ url_for('static', path='js/app.js') }}?v=20260309-1"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand-block">
      <div class="brand-name" aria-label="teradata logo">
        <img class="brand-logo-img" src="{{ url_for('static', path='img/teradata-logo-2024.png') }}" alt="Teradata" />
      </div>
      <p class="brand-sub">Enterprise AI Platform</p>
    </div>
    <div class="title-block">
      {% if logged_in %}
      <div id="top-op-stack-shell" class="top-op-stack" aria-live="polite">
        {% include "partials/top_status.html" %}
      </div>
      {% endif %}
    </div>
    <div class="top-actions">
      {% if logged_in %}
      <form method="post" action="/logout">
        <button type="submit" class="chip-btn">Log Out</button>
      </form>
      <span class="user-name">{{ username }}</span>
      <span class="avatar">{{ user_initials }}</span>
      {% endif %}
    </div>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
