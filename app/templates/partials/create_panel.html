<p class="muted step-lock-note" {% if evs.connected %}hidden{% endif %}>Step 2 is locked. Complete Step 1 first.</p>

<form
  class="stack {% if not evs.connected %}disabled-block{% endif %}"
  hx-post="/ui/create/upload"
  hx-target="#create-result"
  hx-swap="innerHTML"
  enctype="multipart/form-data"
>
  <section class="param-group">
    <h3>Select Documents</h3>
    <div class="select-docs-layout">
      <div class="select-docs-left">
        <label class="field field-file-auto">
          <span>Upload PDF / Documents</span>
          <div class="file-input-shell" data-file-shell>
            <input
              type="file"
              name="files"
              multiple
              class="file-input-native"
              data-file-input
              data-file-default="No files selected"
              data-file-multi-label="files selected"
              {% if not evs.connected %}disabled{% endif %}
            />
            <button type="button" class="ghost file-input-btn" data-file-trigger {% if not evs.connected %}disabled{% endif %}>Choose Files</button>
            <span class="file-input-name" data-file-name>No files selected</span>
          </div>
        </label>
        <div class="selected-files-panel" data-selected-doc-paths>
          {% include "partials/selected_documents.html" %}
        </div>
      </div>
      <div class="select-docs-right">
        {% set _doc_pipeline_mode = create_values.get('doc_pipeline_mode', 'text_core') %}
        <section class="doc-pipeline-panel" aria-label="Content processing mode">
          <label class="field doc-pipeline-mode-field">
            <span>Content Processing Mode</span>
            <select
              name="doc_pipeline_mode"
              data-doc-pipeline-mode
              {% if not evs.connected %}disabled{% endif %}
            >
              <option value="text_core" {% if _doc_pipeline_mode != 'format_fusion' %}selected{% endif %}>Text Core</option>
              <option value="format_fusion" {% if _doc_pipeline_mode == 'format_fusion' %}selected{% endif %}>Format Fusion</option>
            </select>
          </label>
          <div class="doc-pipeline-groups">
            <section class="doc-pipeline-group {% if _doc_pipeline_mode == 'format_fusion' %}doc-mode-hidden{% endif %}" data-doc-mode-for="text_core">
              <div class="select-docs-options">
                <label class="field">
                  <span>chunk_size</span>
                  <input type="number" name="chunk_size" value="{{ create_values.get('chunk_size', '') }}" placeholder="500" {% if not evs.connected %}disabled{% endif %} />
                </label>
                <label class="field">
                  <span>optimized_chunking</span>
                  <select name="optimized_chunking" {% if not evs.connected %}disabled{% endif %}>
                    <option value="">(not set)</option>
                    <option value="false" {% if create_values.get('optimized_chunking', '') == 'false' %}selected{% endif %}>false</option>
                    <option value="true" {% if create_values.get('optimized_chunking', '') == 'true' %}selected{% endif %}>true</option>
                  </select>
                </label>
                <label class="field">
                  <span>header_height</span>
                  <input type="number" name="header_height" min="0" step="1" value="{{ create_values.get('header_height', '') }}" placeholder="" {% if not evs.connected %}disabled{% endif %} />
                </label>
                <label class="field">
                  <span>footer_height</span>
                  <input type="number" name="footer_height" min="0" step="1" value="{{ create_values.get('footer_height', '') }}" placeholder="" {% if not evs.connected %}disabled{% endif %} />
                </label>
              </div>
            </section>
            <section class="doc-pipeline-group {% if _doc_pipeline_mode != 'format_fusion' %}doc-mode-hidden{% endif %}" data-doc-mode-for="format_fusion">
              <div class="select-docs-options fusion-params-grid">
                <label class="field">
                  <span>fusion_strategy</span>
                  <select name="fusion_strategy" {% if not evs.connected %}disabled{% endif %}>
                    <option value="auto" {% if create_values.get('fusion_strategy', 'auto') == 'auto' %}selected{% endif %}>auto</option>
                    <option value="layout" {% if create_values.get('fusion_strategy', '') == 'layout' %}selected{% endif %}>layout</option>
                    <option value="fast" {% if create_values.get('fusion_strategy', '') == 'fast' %}selected{% endif %}>fast</option>
                  </select>
                </label>
                <label class="field">
                  <span>fusion_chunk_size</span>
                  <input type="number" name="fusion_chunk_size" value="{{ create_values.get('fusion_chunk_size', '600') }}" placeholder="600" {% if not evs.connected %}disabled{% endif %} />
                </label>
                <label class="field">
                  <span>fusion_chunk_overlap</span>
                  <input type="number" name="fusion_chunk_overlap" value="{{ create_values.get('fusion_chunk_overlap', '80') }}" placeholder="80" {% if not evs.connected %}disabled{% endif %} />
                </label>
                <label class="field">
                  <span>fusion_ocr_languages</span>
                  <input type="text" name="fusion_ocr_languages" value="{{ create_values.get('fusion_ocr_languages', 'ja,en') }}" placeholder="ja,en" {% if not evs.connected %}disabled{% endif %} />
                </label>
                <label class="field">
                  <span>fusion_keep_tables</span>
                  <select name="fusion_keep_tables" {% if not evs.connected %}disabled{% endif %}>
                    <option value="true" {% if create_values.get('fusion_keep_tables', 'true') == 'true' %}selected{% endif %}>true</option>
                    <option value="false" {% if create_values.get('fusion_keep_tables', '') == 'false' %}selected{% endif %}>false</option>
                  </select>
                </label>
                <label class="field">
                  <span>fusion_extract_images</span>
                  <select name="fusion_extract_images" {% if not evs.connected %}disabled{% endif %}>
                    <option value="false" {% if create_values.get('fusion_extract_images', 'false') == 'false' %}selected{% endif %}>false</option>
                    <option value="true" {% if create_values.get('fusion_extract_images', '') == 'true' %}selected{% endif %}>true</option>
                  </select>
                </label>
              </div>
            </section>
          </div>
        </section>
      </div>
    </div>
  </section>

  <section class="param-group">
    <h3>Basic</h3>
    <input type="hidden" name="create_preset" value="auto" />
    <div class="basic-layout">
      <div class="basic-row basic-row-first">
        <label class="field">
          <span>Vector Store Name</span>
          <input
            type="text"
            name="vector_store_name"
            value="{{ create_values.get('vector_store_name', 'TokioMarine') }}"
            placeholder="updated_vs or pdf_vs name"
            {% if not evs.connected %}disabled{% endif %}
          />
        </label>
      </div>
      <div class="basic-row basic-row-second">
        <label class="field">
          <span>embeddings_model</span>
          <select name="embeddings_model" {% if not evs.connected %}disabled{% endif %}>
            <option value="">(not set)</option>
            <optgroup label="AWS">
              <option value="amazon.titan-embed-text-v1" {% if create_values.get('embeddings_model', '') == 'amazon.titan-embed-text-v1' %}selected{% endif %}>amazon.titan-embed-text-v1</option>
              <option value="amazon.titan-embed-image-v1" {% if create_values.get('embeddings_model', '') == 'amazon.titan-embed-image-v1' %}selected{% endif %}>amazon.titan-embed-image-v1</option>
              <option value="amazon.titan-embed-text-v2:0" {% if create_values.get('embeddings_model', '') == 'amazon.titan-embed-text-v2:0' %}selected{% endif %}>amazon.titan-embed-text-v2:0</option>
            </optgroup>
            <optgroup label="Azure">
              <option value="text-embedding-ada-002" {% if create_values.get('embeddings_model', '') == 'text-embedding-ada-002' %}selected{% endif %}>text-embedding-ada-002</option>
              <option value="text-embedding-3-small" {% if create_values.get('embeddings_model', '') == 'text-embedding-3-small' %}selected{% endif %}>text-embedding-3-small</option>
              <option value="text-embedding-3-large" {% if create_values.get('embeddings_model', '') == 'text-embedding-3-large' %}selected{% endif %}>text-embedding-3-large</option>
            </optgroup>
          </select>
        </label>
        <label class="field">
          <span>search_algorithm</span>
          <select name="search_algorithm" {% if not evs.connected %}disabled{% endif %}>
            <option value="VECTORDISTANCE" {% if create_values.get('search_algorithm', 'VECTORDISTANCE') == 'VECTORDISTANCE' %}selected{% endif %}>VECTORDISTANCE</option>
            <option value="KMEANS" {% if create_values.get('search_algorithm', '') == 'KMEANS' %}selected{% endif %}>KMEANS</option>
            <option value="HNSW" {% if create_values.get('search_algorithm', '') == 'HNSW' %}selected{% endif %}>HNSW</option>
          </select>
        </label>
        <label class="field">
          <span>top_k</span>
          <input type="number" name="top_k" value="{{ create_values.get('top_k', '') }}" placeholder="5 or 10" {% if not evs.connected %}disabled{% endif %} />
        </label>
        <label class="field">
          <span>object_names</span>
          <input
            type="text"
            name="object_names"
            value="{{ create_values.get('object_names', '') }}"
            {% if not evs.connected %}disabled{% endif %}
          />
        </label>
        <label class="field">
          <span>data_columns (comma separated)</span>
          <input type="text" name="data_columns" value="{{ create_values.get('data_columns', '') }}" {% if not evs.connected %}disabled{% endif %} />
        </label>
        <label class="field">
          <span>vector_column</span>
          <input type="text" name="vector_column" value="{{ create_values.get('vector_column', '') }}" {% if not evs.connected %}disabled{% endif %} />
        </label>
        <label class="field">
          <span>metric</span>
          <select name="metric" {% if not evs.connected %}disabled{% endif %}>
            <option value="">(not set)</option>
            <option value="COSINE" {% if create_values.get('metric', '') == 'COSINE' %}selected{% endif %}>COSINE</option>
            <option value="EUCLIDEAN" {% if create_values.get('metric', '') == 'EUCLIDEAN' %}selected{% endif %}>EUCLIDEAN</option>
            <option value="DOTPRODUCT" {% if create_values.get('metric', '') == 'DOTPRODUCT' %}selected{% endif %}>DOTPRODUCT</option>
          </select>
        </label>
        <label class="field">
          <span>key_columns (comma separated)</span>
          <input type="text" name="key_columns" value="{{ create_values.get('key_columns', '') }}" placeholder="rev_id, aid" {% if not evs.connected %}disabled{% endif %} />
        </label>
      </div>
    </div>
  </section>

  <section class="param-group" data-algorithm-panel>
    <h3>Search Algorithm</h3>
    <p class="muted algorithm-hint" data-algo-hint></p>
    <div class="param-grid compact compact-tight" data-algo-param-scope>
      <label class="field" data-algo-for="VECTORDISTANCE KMEANS">
        <span>search_threshold</span>
        <input type="number" step="any" name="search_threshold" value="{{ create_values.get('search_threshold', '') }}" placeholder="0.75" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="KMEANS">
        <span>initial_centroids_method</span>
        <select name="initial_centroids_method" {% if not evs.connected %}disabled{% endif %}>
          <option value="">(not set)</option>
          <option value="RANDOM" {% if create_values.get('initial_centroids_method', '') == 'RANDOM' %}selected{% endif %}>RANDOM</option>
          <option value="KMEANS++" {% if create_values.get('initial_centroids_method', '') == 'KMEANS++' %}selected{% endif %}>KMEANS++</option>
        </select>
      </label>
      <label class="field" data-algo-for="KMEANS">
        <span>train_numcluster</span>
        <input type="number" name="train_numcluster" value="{{ create_values.get('train_numcluster', '') }}" placeholder="8" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="KMEANS">
        <span>max_iternum</span>
        <input type="number" name="max_iternum" value="{{ create_values.get('max_iternum', '') }}" placeholder="10" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="KMEANS">
        <span>stop_threshold</span>
        <input type="number" step="any" name="stop_threshold" value="{{ create_values.get('stop_threshold', '') }}" placeholder="0.0395" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="KMEANS HNSW">
        <span>seed</span>
        <input type="number" name="seed" value="{{ create_values.get('seed', '') }}" placeholder="10" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="KMEANS">
        <span>num_init</span>
        <input type="number" name="num_init" value="{{ create_values.get('num_init', '') }}" placeholder="1" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="KMEANS">
        <span>search_numcluster</span>
        <input type="number" name="search_numcluster" value="{{ create_values.get('search_numcluster', '') }}" placeholder="4" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="HNSW">
        <span>ef_search</span>
        <input type="number" name="ef_search" value="{{ create_values.get('ef_search', '') }}" placeholder="32" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="HNSW">
        <span>num_layer</span>
        <input type="number" name="num_layer" value="{{ create_values.get('num_layer', '') }}" placeholder="2" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="HNSW">
        <span>ef_construction</span>
        <input type="number" name="ef_construction" value="{{ create_values.get('ef_construction', '') }}" placeholder="32" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="HNSW">
        <span>num_connpernode</span>
        <input type="number" name="num_connpernode" value="{{ create_values.get('num_connpernode', '') }}" placeholder="32" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="HNSW">
        <span>maxnum_connpernode</span>
        <input type="number" name="maxnum_connpernode" value="{{ create_values.get('maxnum_connpernode', '') }}" placeholder="32" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field" data-algo-for="HNSW">
        <span>apply_heuristics</span>
        <select name="apply_heuristics" {% if not evs.connected %}disabled{% endif %}>
          <option value="">(not set)</option>
          <option value="true" {% if create_values.get('apply_heuristics', '') == 'true' %}selected{% endif %}>true</option>
          <option value="false" {% if create_values.get('apply_heuristics', '') == 'false' %}selected{% endif %}>false</option>
        </select>
      </label>
    </div>
  </section>

  <section class="param-group">
    <h3>Rerank</h3>
    <div class="param-grid compact rerank-grid">
      <label class="field">
        <span>Rerank Weight</span>
        <input type="number" step="any" name="rerank_weight" value="{{ create_values.get('rerank_weight', '') }}" placeholder="0.2" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field">
        <span>Relevance Top K</span>
        <input type="number" name="relevance_top_k" value="{{ create_values.get('relevance_top_k', '') }}" placeholder="60" {% if not evs.connected %}disabled{% endif %} />
      </label>
      <label class="field">
        <span>Relevance Threshold</span>
        <input type="number" step="any" name="relevance_search_threshold" value="{{ create_values.get('relevance_search_threshold', '') }}" placeholder="0.2" {% if not evs.connected %}disabled{% endif %} />
      </label>
    </div>
  </section>

  <div class="stack-inline">
    <button type="submit" name="create_mode" value="core" class="progress-btn" data-progress-button {% if not evs.connected %}disabled{% endif %}>
      <span class="progress-btn-label">Create Vector Store</span>
      <span class="progress-btn-loading">
        <span class="progress-btn-spinner" aria-hidden="true"></span>
        <span>Creating...</span>
      </span>
    </button>
  </div>
</form>

<div id="create-result">
  {% include "partials/create_result.html" %}
</div>
