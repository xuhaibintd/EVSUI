{% set selected_loaded_run_id = (bookrag_selected_loaded_csv_run_id|default('')) or create_values.get('bookrag_loaded_csv_run_id', '') %}
{% set current_mode = (_doc_pipeline_mode|default('multi_format_bookrag')) %}
<label
  id="bookrag-loaded-vector-store-field"
  class="field basic-inline-field{% if current_mode != 'multi_format_bookrag' %} doc-mode-hidden{% endif %}"
  data-doc-mode-for="multi_format_bookrag"
  {% if current_mode != 'multi_format_bookrag' %}hidden aria-hidden="true"{% endif %}
  {% if bookrag_vector_name_oob|default(false) %}hx-swap-oob="outerHTML"{% endif %}
>
  <span class="field-label">Vector Store Name</span>
  <select
    name="bookrag_loaded_csv_run_id"
    data-bookrag-loaded-run-select
    required
    {% if not evs.connected or current_mode != 'multi_format_bookrag' %}disabled{% endif %}
  >
    {% if bookrag_loaded_csv_runs %}
      {% for run in bookrag_loaded_csv_runs %}
      <option value="{{ run.csv_run_id }}" {% if selected_loaded_run_id == run.csv_run_id %}selected{% endif %}>
        {{ run.vector_store_name }} · {{ run.target_database }} · tables ready
      </option>
      {% endfor %}
    {% else %}
      <option value="" selected>No loaded table run</option>
    {% endif %}
  </select>
</label>
