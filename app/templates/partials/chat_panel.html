<div class="stack {% if not evs.connected %}disabled-block{% endif %}">
  <div
    id="chat-messages"
    class="chat-window"
    style="overflow: hidden !important; scrollbar-width: none; -ms-overflow-style: none;"
  >
    {% include "partials/chat_messages.html" %}
  </div>
  <style>
    #chat-messages::-webkit-scrollbar { width: 0; height: 0; }
  </style>

  <form id="chat-form" class="stack chat-shell" hx-post="/ui/chat" hx-target="#chat-messages" hx-swap="innerHTML" hx-indicator="#chat-progress">
    {% set is_oob = false %}
    {% include "partials/selected_vector_store_card.html" %}
    <label class="label" for="validation-target">Retrieval Method</label>
    <select name="validation_target" id="validation-target" {% if not evs.connected %}disabled{% endif %}>
      <option value="vectorstore.ask">VectorStore.ask</option>
      <option value="vectorstore.similarity_search">VectorStore.similarity_search</option>
    </select>
    <textarea name="message" rows="2" required {% if not evs.connected %}disabled{% endif %}></textarea>
    <div class="stack-inline chat-actions">
      <button type="submit" class="progress-btn" data-progress-button {% if not evs.connected %}disabled{% endif %}>
        <span class="progress-btn-label">Send</span>
        <span class="progress-btn-loading">
          <span class="progress-btn-spinner" aria-hidden="true"></span>
          <span>Sending...</span>
        </span>
      </button>
      <button type="button" class="ghost" hx-post="/ui/chat/reset" hx-target="#chat-messages" hx-swap="innerHTML" {% if not evs.connected %}disabled{% endif %}>Clear</button>
    </div>
    <div id="chat-progress" class="chat-progress" role="status" aria-live="polite">
      <span class="connect-progress-spinner" aria-hidden="true"></span>
      <span>Processing request, please wait...</span>
    </div>
  </form>
</div>
