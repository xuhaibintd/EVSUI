<div class="stack chat-layout {% if not evs.connected %}disabled-block{% endif %}">
  <div id="chat-messages" class="chat-window">
    {% include "partials/chat_messages.html" %}
  </div>

  <form id="chat-form" class="stack chat-shell" data-retrieval-mode-form data-bookrag-api-form hx-post="/ui/chat" hx-target="#chat-messages" hx-swap="innerHTML">
    {% set is_oob = false %}
    {% include "partials/chat_vector_store_list.html" %}
    <div class="label chat-section-label">Retrieval Method</div>
    <div class="chat-retrieval-grid" role="radiogroup" aria-label="Retrieval method">
      <div class="chat-retrieval-card chat-retrieval-option is-selected" data-retrieval-option="native">
        <div class="chat-retrieval-inline">
          <label class="chat-retrieval-head" for="retrieval-mode-native">
            <span class="chat-retrieval-choice">
              <input type="radio" id="retrieval-mode-native" name="retrieval_mode" value="native" data-retrieval-mode-toggle checked {% if not evs.connected %}disabled{% endif %}>
              <span class="chat-retrieval-title">Retrieval-only</span>
            </span>
          </label>
          <select name="validation_target" id="validation-target" class="chat-retrieval-control" data-native-only {% if not evs.connected %}disabled{% endif %}>
            <option value="vectorstore.ask">VectorStore.ask</option>
            <option value="vectorstore.similarity_search">VectorStore.similarity_search</option>
          </select>
        </div>
      </div>
      <div class="chat-retrieval-card chat-retrieval-option chat-api-card" data-retrieval-option="api">
        <div class="chat-retrieval-inline">
          <label class="chat-retrieval-head" for="retrieval-mode-api">
            <span class="chat-retrieval-choice">
              <input type="radio" id="retrieval-mode-api" name="retrieval_mode" value="api" data-retrieval-mode-toggle {% if not evs.connected %}disabled{% endif %}>
              <span class="chat-retrieval-title">BookRAG API</span>
            </span>
          </label>
          <div class="stack-inline" style="gap:0.75rem; align-items:center; min-width:0;">
            <span class="label" style="margin:0; white-space:nowrap;">POST Endpoint</span>
            <input
              id="bookrag-api-url"
              class="chat-api-url chat-retrieval-control"
              data-api-only
              type="text"
              readonly
              value="{{ request.url_for('api_bookrag_retrieve') }}"
              style="flex:1 1 auto; min-width:0;"
              {% if not evs.connected %}disabled{% endif %}
            />
            <span class="label" style="margin:0; white-space:nowrap;">top_k</span>
            <input
              id="bookrag-api-top-k"
              class="chat-retrieval-control"
              data-api-only
              type="number"
              min="1"
              max="20"
              step="1"
              value="5"
              style="width:6rem; flex:0 0 6rem;"
              {% if not evs.connected %}disabled{% endif %}
            />
          </div>
        </div>
      </div>
    </div>
    <div class="chat-section chat-section-question">
      <label class="label" for="chat-message">Question</label>
      <textarea id="chat-message" name="message" rows="2" required {% if not evs.connected %}disabled{% endif %}></textarea>
    </div>
    <div class="stack-inline chat-actions">
      <button type="submit" class="progress-btn" data-progress-button {% if not evs.connected %}disabled{% endif %}>
        <span class="progress-btn-label">Send</span>
        <span class="progress-btn-loading">
          <span class="progress-btn-spinner" aria-hidden="true"></span>
          <span>Sending...</span>
        </span>
      </button>
      <button type="button" class="ghost" hx-post="/ui/chat/reset" hx-target="#chat-messages" hx-swap="innerHTML" {% if not evs.connected %}disabled{% endif %}>Clear</button>
    </div>
  </form>
</div>
